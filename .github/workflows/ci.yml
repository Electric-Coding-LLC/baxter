name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"
          cache: true
      - run: go mod download
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go test ./...

  macos-app-test:
    runs-on: [self-hosted, macOS, ARM64, baxter-macos26]
    timeout-minutes: 45
    env:
      DERIVED_DATA_PATH: ${{ github.workspace }}/.ci/DerivedData
      RESULT_BUNDLE_PATH: ${{ github.workspace }}/.ci/TestResults/BaxterMenuBarApp.xcresult
    steps:
      - uses: actions/checkout@v4
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-deriveddata-${{ hashFiles('apps/macos/BaxterMenuBarApp.xcodeproj/project.pbxproj', 'apps/macos/BaxterMenuBarApp/**/*.swift', 'apps/macos/BaxterMenuBarAppTests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-deriveddata-
      - name: Run macOS app tests
        run: |
          mkdir -p "$(dirname "$RESULT_BUNDLE_PATH")"
          xcodebuild -project apps/macos/BaxterMenuBarApp.xcodeproj -scheme BaxterMenuBarApp -destination 'platform=macOS' -derivedDataPath "$DERIVED_DATA_PATH" -resultBundlePath "$RESULT_BUNDLE_PATH" test
      - name: Run launchd IPC smoke check
        env:
          BAXTER_IPC_TOKEN: ci-smoke-current-token,ci-smoke-next-token
          BAXTER_SMOKE_DEADLINE_SECONDS: "120"
          BAXTER_IPC_READY_ATTEMPTS: "24"
          BAXTER_IPC_READY_SLEEP_SECONDS: "0.5"
        run: |
          set -euo pipefail
          if ! launchctl print "gui/$(id -u)" >/dev/null 2>&1; then
            echo "Skipping launchd smoke check: gui/$(id -u) domain unavailable on runner."
            exit 0
          fi
          trap './scripts/uninstall-launchd.sh' EXIT
          ./scripts/init-config.sh "$GITHUB_WORKSPACE"
          ./scripts/install-launchd.sh
          ./scripts/smoke-launchd-ipc.sh
      - name: Collect launchd logs (on failure)
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p .ci/launchd-logs
          cp -f "$HOME/Library/Logs/baxterd.out.log" .ci/launchd-logs/ 2>/dev/null || true
          cp -f "$HOME/Library/Logs/baxterd.err.log" .ci/launchd-logs/ 2>/dev/null || true
      - name: Upload launchd logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: launchd-logs-${{ github.run_id }}
          path: .ci/launchd-logs
          if-no-files-found: warn
      - name: Upload macOS test result bundle (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-xcresult-${{ github.run_id }}
          path: ${{ env.RESULT_BUNDLE_PATH }}
          if-no-files-found: warn

  upgrade-preservation-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"
          cache: true
      - run: go mod download
      - name: Build before/after CLI binaries
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          mkdir -p .ci/bin
          before_ref="${BASE_SHA:-}"
          if [ -z "$before_ref" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              before_ref="$(git rev-parse HEAD^)"
            else
              before_ref="$(git rev-parse HEAD)"
            fi
          fi
          echo "upgrade-preservation before_ref=$before_ref"

          git worktree add --detach .ci/before "$before_ref"
          trap 'git worktree remove --force .ci/before' EXIT

          (
            cd .ci/before
            go mod download
            go build -o "$GITHUB_WORKSPACE/.ci/bin/baxter-before" ./cmd/baxter
          )
          go build -o .ci/bin/baxter-after ./cmd/baxter
      - name: Run upgrade preservation smoke check
        run: ./scripts/upgrade-preservation-smoke.sh --before .ci/bin/baxter-before --after .ci/bin/baxter-after
