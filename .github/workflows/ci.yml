name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      swift_style: ${{ steps.set_outputs.outputs.swift_style }}
      upgrade_smoke: ${{ steps.set_outputs.outputs.upgrade_smoke }}
    steps:
      - name: Default all conditional jobs to run for non-PR events
        id: defaults
        if: github.event_name != 'pull_request'
        run: |
          echo "swift_style=true" >>"$GITHUB_OUTPUT"
          echo "upgrade_smoke=true" >>"$GITHUB_OUTPUT"
      - name: Detect changed paths for PR events
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            swift_style:
              - 'apps/macos/BaxterApp/**/*.swift'
              - 'apps/macos/BaxterAppTests/**/*.swift'
              - '.swiftlint.yml'
              - '.swiftformat'
              - 'scripts/swift-style.sh'
              - 'Brewfile'
            upgrade_smoke:
              - 'cmd/baxter/**'
              - 'internal/backup/**'
              - 'internal/cli/**'
              - 'internal/config/**'
              - 'internal/crypto/**'
              - 'internal/state/**'
              - 'internal/storage/**'
              - 'scripts/upgrade-preservation-smoke.sh'
              - 'go.mod'
              - 'go.sum'
              - 'config.example.toml'
      - name: Publish effective change flags
        id: set_outputs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "swift_style=${{ steps.filter.outputs.swift_style }}" >>"$GITHUB_OUTPUT"
            echo "upgrade_smoke=${{ steps.filter.outputs.upgrade_smoke }}" >>"$GITHUB_OUTPUT"
          else
            echo "swift_style=${{ steps.defaults.outputs.swift_style }}" >>"$GITHUB_OUTPUT"
            echo "upgrade_smoke=${{ steps.defaults.outputs.upgrade_smoke }}" >>"$GITHUB_OUTPUT"
          fi

  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true
      - run: go mod download
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go test ./...

  swift-style:
    needs: [changes]
    if: ${{ needs.changes.outputs.swift_style == 'true' }}
    runs-on: [self-hosted, macOS, ARM64, baxter-macos26]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install Swift style tools
        run: |
          set -euo pipefail
          brew bundle --file Brewfile --no-upgrade
      - name: SwiftLint check (Baxter app scope)
        run: ./scripts/swift-style.sh lint-check
      - name: SwiftFormat check (Baxter app scope)
        run: ./scripts/swift-style.sh format-check

  macos-app-test:
    runs-on: [self-hosted, macOS, ARM64, baxter-macos26]
    timeout-minutes: 45
    env:
      DERIVED_DATA_PATH: ${{ github.workspace }}/.ci/DerivedData
      RESULT_BUNDLE_PATH: ${{ github.workspace }}/.ci/TestResults/BaxterApp.xcresult
      BAXTER_CI_HOME_DIR: ${{ github.workspace }}/.ci/baxter-ci-home-${{ github.run_id }}-${{ github.run_attempt }}
      BAXTER_CI_LAUNCHD_LABEL: com.electriccoding.baxterd.ci.${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5
      - name: Restore Xcode DerivedData cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-deriveddata-${{ hashFiles('apps/macos/BaxterApp.xcodeproj/project.pbxproj', 'apps/macos/BaxterApp/**/*.swift', 'apps/macos/BaxterAppTests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-deriveddata-
      - name: Run macOS app tests
        run: |
          mkdir -p "$(dirname "$RESULT_BUNDLE_PATH")"
          xcodebuild -project apps/macos/BaxterApp.xcodeproj -scheme BaxterApp -destination 'platform=macOS' -derivedDataPath "$DERIVED_DATA_PATH" -resultBundlePath "$RESULT_BUNDLE_PATH" test
      - name: Run launchd IPC smoke check
        env:
          BAXTER_IPC_TOKEN: ci-smoke-current-token,ci-smoke-next-token
          BAXTER_SMOKE_DEADLINE_SECONDS: "120"
          BAXTER_IPC_READY_ATTEMPTS: "24"
          BAXTER_IPC_READY_SLEEP_SECONDS: "0.5"
        run: |
          set -euo pipefail
          ci_ipc_port="$((43000 + (GITHUB_RUN_ID % 1000)))"
          ci_ipc_addr="127.0.0.1:${ci_ipc_port}"
          if ! launchctl print "gui/$(id -u)" >/dev/null 2>&1; then
            echo "Skipping launchd smoke check: gui/$(id -u) domain unavailable on runner."
            exit 0
          fi
          # Keep CI smoke setup out of the runner user's real Baxter home.
          rm -rf "$BAXTER_CI_HOME_DIR"
          mkdir -p "$BAXTER_CI_HOME_DIR"
          export BAXTER_HOME_DIR="$BAXTER_CI_HOME_DIR"
          export BAXTER_LAUNCHD_LABEL="$BAXTER_CI_LAUNCHD_LABEL"
          export BAXTER_IPC_ADDR="$ci_ipc_addr"
          export BAXTER_IPC_URL="http://$ci_ipc_addr"
          trap './scripts/uninstall-launchd.sh' EXIT
          ./scripts/init-config.sh "$GITHUB_WORKSPACE"
          ./scripts/install-launchd.sh
          ./scripts/smoke-launchd-ipc.sh
      - name: Collect launchd logs (on failure)
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p .ci/launchd-logs
          cp -f "$BAXTER_CI_HOME_DIR/Library/Logs/baxterd.out.log" .ci/launchd-logs/ 2>/dev/null || true
          cp -f "$BAXTER_CI_HOME_DIR/Library/Logs/baxterd.err.log" .ci/launchd-logs/ 2>/dev/null || true
      - name: Upload launchd logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: launchd-logs-${{ github.run_id }}
          path: .ci/launchd-logs
          if-no-files-found: warn
      - name: Clean isolated Baxter test home
        if: always()
        run: |
          set -euo pipefail
          chmod -R u+w "$BAXTER_CI_HOME_DIR" >/dev/null 2>&1 || true
          rm -rf "$BAXTER_CI_HOME_DIR"
      - name: Upload macOS test result bundle (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: macos-xcresult-${{ github.run_id }}
          path: ${{ env.RESULT_BUNDLE_PATH }}
          if-no-files-found: warn

  upgrade-preservation-smoke:
    needs: [changes]
    if: ${{ needs.changes.outputs.upgrade_smoke == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache: true
      - run: go mod download
      - name: Build before/after CLI binaries
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          mkdir -p .ci/bin
          before_ref="${BASE_SHA:-}"
          if [ -z "$before_ref" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              before_ref="$(git rev-parse HEAD^)"
            else
              before_ref="$(git rev-parse HEAD)"
            fi
          fi
          echo "upgrade-preservation before_ref=$before_ref"

          git worktree add --detach .ci/before "$before_ref"
          trap 'git worktree remove --force .ci/before' EXIT

          (
            cd .ci/before
            go mod download
            go build -o "$GITHUB_WORKSPACE/.ci/bin/baxter-before" ./cmd/baxter
          )
          go build -o .ci/bin/baxter-after ./cmd/baxter
      - name: Run upgrade preservation smoke check
        run: ./scripts/upgrade-preservation-smoke.sh --before .ci/bin/baxter-before --after .ci/bin/baxter-after
