name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      version:
        description: "RC version (example: v0.4.0-rc1)"
        required: true
        default: "v0.4.0-rc1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-rc:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"
          cache: true
      - run: go mod download
      - name: Validate RC version format
        run: |
          set -euo pipefail
          VERSION='${{ inputs.version }}'
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            echo "Invalid RC version format: $VERSION"
            echo "Expected format: vX.Y.Z-rcN"
            exit 1
          fi
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go test ./...
      - name: Build RC artifacts
        env:
          BAXTER_RELEASE_SKIP_TESTS: "1"
        run: ./scripts/release.sh '${{ inputs.version }}'
      - name: Upload RC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baxter-${{ inputs.version }}
          path: dist/${{ inputs.version }}
          if-no-files-found: error
          retention-days: 14

  validate-rc-artifacts:
    runs-on: [self-hosted, macOS, ARM64, baxter-macos26]
    needs: build-rc
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Download RC artifacts
        uses: actions/download-artifact@v4
        with:
          name: baxter-${{ inputs.version }}
          path: .ci/rc-artifacts
      - name: Validate RC install/upgrade/rollback path
        run: |
          set -euo pipefail
          EVIDENCE_PATH="$GITHUB_WORKSPACE/.ci/rc-validation-evidence.md"
          ./scripts/rc-artifact-validation.sh \
            --artifact-dir "$GITHUB_WORKSPACE/.ci/rc-artifacts" \
            --version '${{ inputs.version }}' \
            --evidence "$EVIDENCE_PATH"
      - name: Collect launchd logs (on failure)
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p .ci/launchd-logs
          cp -f "$HOME/Library/Logs/baxterd.out.log" .ci/launchd-logs/ 2>/dev/null || true
          cp -f "$HOME/Library/Logs/baxterd.err.log" .ci/launchd-logs/ 2>/dev/null || true
      - name: Upload launchd logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rc-launchd-logs-${{ github.run_id }}
          path: .ci/launchd-logs
          if-no-files-found: warn
      - name: Upload RC validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-validation-evidence-${{ inputs.version }}-${{ github.run_id }}
          path: .ci/rc-validation-evidence.md
          if-no-files-found: warn
          retention-days: 14
