name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-cli-daemon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"
          cache: true
      - run: go mod download
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go test ./...
      - name: Build release artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          DIST_DIR="dist/${VERSION}"
          mkdir -p "$DIST_DIR"

          GOOS=darwin GOARCH=arm64 go build -o "$DIST_DIR/baxter-darwin-arm64" ./cmd/baxter
          GOOS=darwin GOARCH=arm64 go build -o "$DIST_DIR/baxterd-darwin-arm64" ./cmd/baxterd
          GOOS=linux GOARCH=amd64 go build -o "$DIST_DIR/baxter-linux-amd64" ./cmd/baxter
          GOOS=linux GOARCH=amd64 go build -o "$DIST_DIR/baxterd-linux-amd64" ./cmd/baxterd

          (cd "$DIST_DIR" && sha256sum * > SHA256SUMS)
      - name: Upload CLI/daemon release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baxter-release-cli-${{ github.ref_name }}
          path: dist/${{ github.ref_name }}
          if-no-files-found: error

  build-macos-app:
    runs-on: [self-hosted, macOS, ARM64, baxter-macos26]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Package BaxterApp release artifact
        run: ./scripts/package-macos-app.sh --output-dir "dist/${GITHUB_REF_NAME}"
      - name: Upload macOS app release artifact
        uses: actions/upload-artifact@v4
        with:
          name: baxter-release-app-${{ github.ref_name }}
          path: dist/${{ github.ref_name }}/Baxter-darwin-arm64.zip
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-cli-daemon, build-macos-app]
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: baxter-release-*
          path: .ci/release-assets
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .ci/release-assets/*
